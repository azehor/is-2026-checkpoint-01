<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<title>TeamBoard - Grupo 01</title>
	<style> 
		body { 
			font-family: "Segoe UI", sans-serif;  
			background-color: #015082;
			color: black;
			margin: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 40px
		}
		.container {
			width: 100%;
			max-width: 900px;
			background: white;
			padding: 30px;
			border-radius: 12px;
			box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
		}
		h1{
			margin-top: 0;
			color: #0072bb;
			font-size: 2rem;
			text-align: center;
		}
		.estado-box {
			padding: 10px 15px;
			border-radius: 6px;
			background: #e1f0f9;
			display: inline-block;
			margin-bottom: 25px;
			font-weight: 600;
		}
		.estado-on { 
			color: green; 
			font-weight: bold; 
		}
		.estado-off { 
			color: red; 
			font-weight: bold; 
		}
		table { 
			width: 100%; 
			border-collapse: collapse; 
			overflow: hidden;
			border-radius: 8px; 
		}
		th {
			background-color: #0072bb;
			color: white;
			text-align: center;
			padding: 15px;
			font-size: 0.85rem;
			letter-spacing: 0.03rem
		}
		td { 
			border: 1px solid #e2e8f0; 
			padding: 15px; 
			text-align: left; 
		}
	</style>
</head>

<body> 
	<div class="container">
		<h1>TeamBoard - Grupo 01</h1>
		<div class="estado-box">
			Estado del Backend: <span id="backend-estado" class="estado-off">Desconectado</span>
		</div>
		<table>
			<thead>
				<tr>
					<th>NOMBRE</th>
					<th>APELLIDO</th>
					<th>LEGAJO</th>
					<th>FEATURE</th>
					<th>SERVICIO</th>
					<th>ESTADO</th>
				</tr>
			</thead>
			<tbody id="team-tabla-body"></tbody>
		</table>
	</div>
	<script src="app.js"></script>
</body>
</html>
