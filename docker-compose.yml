services:
  frontend:
    build:
      context: ./frontend/
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:8080"

  backend:
    build:
      context: ./backend/
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "5000:5000"

  database:

  portainer:

volumes:
  db_data:
